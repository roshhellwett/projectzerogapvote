<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Primary amber/orange gradient to match the new visual identity -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#d97706"/> <!-- amber-600 -->
      <stop offset="100%" stop-color="#b45309"/> <!-- amber-700 -->
    </linearGradient>
    <!-- Subtle inner highlight for depth -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Shadow filter for the shield icon -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#78350f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="10" fill="url(#bg)"/>

  <!-- Inner shine overlay -->
  <rect width="32" height="15" rx="10" fill="url(#shine)"/>

  <!-- Shield icon — white outline, centered, filter shadow -->
  <g filter="url(#soft-shadow)" transform="translate(6, 6)">
    <path
      d="M10 2 L3 5 L3 11 C3 16 8 19.5 10 20.5 C12 19.5 17 16 17 11 L17 5 L10 2 Z"
      fill="none"
      stroke="white"
      stroke-width="2"
      stroke-linejoin="round"
      stroke-linecap="round"
    />
  </g>
</svg>
