<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Primary violet‚Üíindigo gradient matching site theme -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <!-- Subtle inner highlight for depth -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Shadow filter for the shield icon -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#4c1d95" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Inner shine overlay -->
  <rect width="32" height="15" rx="8" fill="url(#shine)"/>

  <!-- Shield icon ‚Äî white, centered, filter shadow -->
  <g filter="url(#soft-shadow)" transform="translate(6, 5)">
    <path
      d="M10 1.5 C8 2.5 5.5 3.5 3 3.5 L3 10 C3 14.5 6 17.5 10 19 C14 17.5 17 14.5 17 10 L17 3.5 C14.5 3.5 12 2.5 10 1.5 Z"
      fill="white"
      opacity="0.95"
    />
    <!-- "ZG" zero-gap mark ‚Äî violet on white shield -->
    <text
      x="10" y="13.5"
      text-anchor="middle"
      font-family="system-ui, -apple-system, sans-serif"
      font-size="7.5"
      font-weight="900"
      letter-spacing="-0.5"
      fill="#7c3aed"
    >ZG</text>
  </g>
</svg>
